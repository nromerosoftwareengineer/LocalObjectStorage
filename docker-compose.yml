services:
  postgres:
    image: postgres:16-alpine
    container_name: local-object-storage-postgres
    environment:
      POSTGRES_DB: local_object_storage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d local_object_storage"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
